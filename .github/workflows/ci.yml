name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  typecheck-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run Typecheck
        run: npm run typecheck
        working-directory: frontend
        
      - name: Run Frontend Tests
        run: npx vitest run
        working-directory: frontend

  backend-tests:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: employee_system_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v3
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, curl, mbstring
          tools: phpunit
          
      - name: Verify MySQL Connection
        run: |
          while ! mysqladmin ping -h"127.0.0.1" -P3306 -uroot -proot --silent; do
            sleep 1
          done
          
      - name: Install Composer Dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader
        
      - name: PHP Syntax Check
        run: find backend/ -name "*.php" -print0 | xargs -0 -n1 php -l
        
      - name: Run PHPUnit Tests
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASS: root
          DB_NAME: employee_system_test
          APP_ENV: testing
        run: vendor/bin/phpunit
