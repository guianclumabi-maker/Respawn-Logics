name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  typecheck-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
        
      - name: Run Typecheck
        run: npm run typecheck
        working-directory: frontend
        
      - name: Run Frontend Tests
        run: npx vitest run
        working-directory: frontend

  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: phpunit
          
      - name: Install Composer Dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader || echo "No composer.json found, skipping."
        
      - name: Run PHPUnit Tests
        run: phpunit
